databases:
  - name: adrena-royale-db
    plan: free
    databaseName: adrena_royale
    user: adrena

services:
  # API Server
  - type: web
    name: adrena-royale-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run db:generate && npm run build --filter=api
    startCommand: node apps/api/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: adrena-royale-db
          property: connectionString
      - key: ADRENA_API_BASE_URL
        value: https://datapi.adrena.xyz
      - key: ADRENA_COMPETITION_API_URL
        value: https://adrena-competition-service.onrender.com
      - key: ADRENA_COMPETITION_API_KEY
        sync: false
      - key: SOLANA_RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: ADMIN_WALLETS
        sync: false
      - key: TREASURY_WALLET
        sync: false
      - key: CORS_ORIGIN
        sync: false

  # Web Frontend
  - type: web
    name: adrena-royale-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build --filter=@adrena-royale/shared && npm run build --filter=web
    startCommand: npm run start --filter=web
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
